run_name: "passk_main_v1"
seed: 42

# Reference existing steering config for model + steering params
steering_config: "happy_full.yaml"

# Path to the pre-computed steering vector (relative to this config's directory)
vector_path: "../EasySteer/vectors/happy_diffmean.gguf"

# Single scale: mild steering (pass@1 nearly identical to unsteered)
scales: [0.5]

# Endpoint: GPU 1 vLLM instance with server-level steering
endpoint:
  base_url: "http://localhost:8018/v1"
  steering_mode: "server"

# Pass@k parameters: n=100 for main result
pass_at_k:
  n_samples: 100
  temperatures: [0.8]
  max_tokens: 512
  k_values: [1, 2, 5, 10, 25, 50, 100]

datasets: ["humaneval"]
