<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Poster Title</title>
<style>
  @page {
    size: 594mm 841mm;
    margin: 0;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    width: 594mm;
    height: 841mm;
    font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif;
    background: #fff;
    color: #1a1a1a;
    padding: 12mm;
    display: flex;
    flex-direction: column;
    gap: 6mm;
    -webkit-print-color-adjust: exact;
    print-color-adjust: exact;
  }
  :root {
    --burgundy: rgb(140, 5, 28);
    --panel-bg: #ffffff;
    --gap: 6mm;
    --col-gap: 7mm;
  }

  /* ═══ TITLE BAR ═══ */
  .title-bar {
    background: var(--burgundy);
    border-radius: 5px;
    padding: 12mm 14mm;
    display: flex;
    align-items: center;
    gap: 12mm;
    flex-shrink: 0;
  }
  .title-bar .logo {
    height: 55mm;
    width: auto;
    flex-shrink: 0;
  }
  .title-content h1 {
    color: white;
    font-size: 60pt;
    font-weight: 700;
    line-height: 1.1;
    margin-bottom: 4mm;
  }
  .title-content .authors {
    color: white;
    font-size: 28pt;
    margin-bottom: 3mm;
  }
  .title-content .affiliations {
    color: rgba(255,255,255,0.85);
    font-size: 22pt;
    font-style: italic;
    margin-bottom: 3mm;
  }
  .title-content .subtitle {
    color: rgba(255,255,255,0.7);
    font-size: 18pt;
  }

  /* ═══ COLUMNS ═══ */
  .columns {
    display: grid;
    grid-template-columns: 1fr 1fr 1fr;
    gap: var(--col-gap);
    flex: 1;
    min-height: 0;
  }
  .column {
    display: flex;
    flex-direction: column;
    gap: var(--gap);
  }

  /* ═══ SECTION PANEL ═══ */
  .section {
    border-radius: 4px;
    overflow: hidden;
    background: var(--panel-bg);
  }
  .section-title {
    background: var(--burgundy);
    color: white;
    font-size: 26pt;
    font-weight: 700;
    padding: 3mm 5mm;
    line-height: 1.2;
  }
  .section-body {
    padding: 5mm;
    font-size: 24pt;
    line-height: 1.30;
  }
  .section-body p {
    margin-bottom: 3mm;
  }
  .section-body p:last-child {
    margin-bottom: 0;
  }
  .section-body strong {
    font-weight: 700;
  }

  /* ═══ FIGURES ═══ */
  .figure-single {
    width: 100%;
    height: auto;
    display: block;
    margin: 3mm 0;
  }
  .figure-pair {
    display: flex;
    gap: 2mm;
    margin: 3mm 0;
  }
  .figure-pair img {
    width: calc(50% - 1mm);
    height: auto;
  }
  .caption {
    font-size: 16pt;
    color: #555;
    font-style: italic;
    line-height: 1.25;
    margin-top: 2mm;
  }

  /* ═══ BULLETS ═══ */
  .section-body ul {
    list-style: disc;
    padding-left: 8mm;
    margin: 0;
  }
  .section-body ul li {
    margin-bottom: 2mm;
    font-size: 24pt;
    line-height: 1.30;
  }
  .section-body ul li:last-child {
    margin-bottom: 0;
  }

  /* ═══ SPECIAL ═══ */
  .ack-text {
    font-style: italic;
    color: #555;
  }
  .refs-text {
    font-size: 20pt;
  }

  @media print {
    body {
      -webkit-print-color-adjust: exact;
      print-color-adjust: exact;
    }
  }
</style>
</head>
